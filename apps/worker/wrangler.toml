name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# デフォルト = テスト環境
# 使い方: npx wrangler deploy
# ═══════════════════════════════════════════════════════════════
account_id = "YOUR_DEV_ACCOUNT_ID"

[assets]
directory = "dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "42b8b97e-65e5-455a-b16a-fb1e61f50b6b"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *"]

# ═══════════════════════════════════════════════════════════════
# 本番環境
# 使い方: npx wrangler deploy --env production --name your-worker-name
# D1:     npx wrangler d1 execute line-crm --env production --remote --file ...
# ═══════════════════════════════════════════════════════════════
[env.production]
account_id = "YOUR_ACCOUNT_ID"

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "YOUR_D1_DATABASE_ID"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[env.production.triggers]
crons = ["*/5 * * * *"]
